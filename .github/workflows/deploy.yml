name: Deploy to Azure

on:
  push:
    branches: [ main ] # Sadece main'e push atınca çalışır

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Sunucusuna SSH ile Bağlan ve Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/Sadecekedi.
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            docker compose build --no-cache cat-validator backend
            docker compose up -d --force-recreate cat-validator backend
            docker image prune -f
